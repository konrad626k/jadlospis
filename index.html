<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#c85a2a">
<title>Jadłospis dla Pary 🍽️</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f2f4f5;
  --surface: #ffffff;
  --border: #e2e5e7;

  --accent: #ff6b35;
  --accent2: #2e8b57;
  --accent3: #f4b942;

  --text: #1f2933;
  --muted: #6b7280;
  --tag-bg: #eef2f4;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body { height: 100%; overflow: hidden; font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

.app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

/* HEADER */
.top-bar {
  background: var(--accent);
  padding: calc(var(--safe-t) + 12px) 18px 12px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
  box-shadow: 0 2px 12px rgba(200,90,42,0.3);
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon { font-size: 26px; }
.logo-text h1 { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 700; color: white; line-height: 1.1; }
.logo-text span { font-size: 10px; color: rgba(255,255,255,0.75); font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; }
.week-chip { background: rgba(255,255,255,0.2); color: white; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; border: 1px solid rgba(255,255,255,0.3); cursor: pointer; font-family: 'Nunito', sans-serif; }
.week-chip:active { background: rgba(255,255,255,0.3); }

/* TABS */
.tabs { display: flex; background: var(--surface); border-bottom: 2px solid var(--border); flex-shrink: 0; }
.tab { flex: 1; padding: 11px 8px; font-size: 11px; font-weight: 700; text-align: center; cursor: pointer; color: var(--muted); border: none; background: none; font-family: 'Nunito', sans-serif; letter-spacing: 0.3px; transition: all 0.2s; border-bottom: 2px solid transparent; margin-bottom: -2px; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab .ti { display: block; font-size: 18px; margin-bottom: 2px; }

/* SCROLL */
.scroll-area { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }
.page { display: none; padding: 16px; animation: pi .2s ease; }
.page.active { display: block; }
@keyframes pi { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

/* WEEK SELECTOR */
.week-selector { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 16px; scrollbar-width: none; }
.week-selector::-webkit-scrollbar { display: none; }
.wsb { flex-shrink: 0; padding: 8px 16px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--surface); color: var(--muted); font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Nunito', sans-serif; transition: all .15s; }
.wsb.active { background: var(--accent); color: white; border-color: var(--accent); }
.wsb:active { transform: scale(.95); }

/* DAY CARDS */
.day-section { margin-bottom: 12px; }
.day-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--accent); border-radius: 14px 14px 0 0; cursor: pointer; }
.day-header h3 { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 700; color: white; }
.day-meta { display: flex; align-items: center; gap: 8px; }
.day-badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 10px; background: rgba(255,255,255,0.2); color: white; }
.day-toggle { color: white; font-size: 14px; transition: transform .2s; }
.day-toggle.open { transform: rotate(180deg); }
.day-body { background: var(--surface); border: 1px solid var(--border); border-top: none; border-radius: 0 0 14px 14px; overflow: hidden; }
.day-body.hidden { display: none; }

/* MEAL ROWS */
.meal-row { display: flex; gap: 12px; padding: 12px 14px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .15s; align-items: flex-start; }
.meal-row:last-child { border-bottom: none; }
.meal-row:active { background: var(--tag-bg); }
.meal-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.ic1 { background: #fff3e0; } .ic2 { background: #e8f5e9; } .ic3 { background: #fce4ec; } .ic4 { background: #f3e5f5; } .ic5 { background: #e3f2fd; }
.meal-info { flex: 1; min-width: 0; }
.meal-type { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 2px; }
.meal-name { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 600; color: var(--text); line-height: 1.2; margin-bottom: 3px; }
.meal-flag { font-size: 13px; }
.meal-arrow { color: var(--muted); font-size: 12px; padding-top: 6px; }
.box-tag { display: inline-flex; align-items: center; gap: 3px; background: #e3f2fd; color: #1565c0; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 6px; margin-top: 3px; }

/* RECIPE MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(26,18,8,0.6); z-index: 200; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity .25s; }
.modal-overlay.show { opacity: 1; pointer-events: all; }
.modal { background: var(--bg); border-radius: 24px 24px 0 0; width: 100%; max-height: 88vh; overflow-y: auto; padding: 0 0 calc(var(--safe-b) + 20px); transform: translateY(100%); transition: transform .3s cubic-bezier(.32,0,.67,0); }
.modal-overlay.show .modal { transform: translateY(0); }
.modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
.modal-header { padding: 16px 18px 12px; border-bottom: 1px solid var(--border); }
.modal-flag { font-size: 22px; margin-bottom: 4px; }
.modal-type { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 4px; }
.modal-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 700; line-height: 1.2; }
.modal-body { padding: 16px 18px; }
.section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent); margin-bottom: 10px; margin-top: 16px; }
.section-title:first-child { margin-top: 0; }
.ingredients-list { display: flex; flex-direction: column; gap: 6px; }
.ingredient { display: flex; gap: 10px; font-size: 13px; align-items: baseline; }
.ing-qty { font-weight: 700; color: var(--accent); min-width: 60px; font-size: 12px; }
.ing-name { color: var(--text); }
.recipe-steps { display: flex; flex-direction: column; gap: 10px; }
.step { display: flex; gap: 10px; font-size: 13px; line-height: 1.6; color: var(--text); }
.step-num { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); color: white; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.tip-box { background: #fffbeb; border: 1px solid #fcd34d; border-radius: 10px; padding: 10px 12px; font-size: 12px; color: #78350f; margin-top: 12px; line-height: 1.6; }
.tip-box strong { display: block; margin-bottom: 3px; }
.close-btn { width: calc(100% - 36px); margin: 16px 18px 0; padding: 13px; border-radius: 14px; border: none; background: var(--accent); color: white; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; }
.close-btn:active { transform: scale(.98); }

/* SHOPPING PAGE */
.shop-week-label { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.shop-sub { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
.shop-cat { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 10px; }
.shop-cat-hdr { padding: 11px 14px; font-size: 11px; font-weight: 700; letter-spacing: .5px; display: flex; align-items: center; gap: 7px; border-bottom: 1px solid var(--border); }
.hm { background: #ffeaea; color: #c0392b; }
.hd { background: #fffde7; color: #c77800; }
.hv { background: #e8f5e9; color: #2a7a4f; }
.hg { background: #f3e5f5; color: #7b1fa2; }
.ho { background: #e3f2fd; color: #1565c0; }
.hc { background: #fce4ec; color: #ad1457; }
.sitem { display: flex; align-items: center; gap: 11px; padding: 11px 14px; border-bottom: 1px solid rgba(0,0,0,.04); cursor: pointer; transition: background .15s; }
.sitem:last-child { border-bottom: none; }
.sitem:active { background: var(--tag-bg); }
.sitem.done { opacity: .4; }
.sitem.done .iname { text-decoration: line-through; }
.chk { width: 22px; height: 22px; border-radius: 7px; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; transition: all .2s; }
.sitem.done .chk { background: var(--accent2); border-color: var(--accent2); color: white; }
.iname { flex: 1; font-size: 13px; font-weight: 500; }
.imeta { text-align: right; flex-shrink: 0; }
.iqty { font-size: 10px; color: var(--muted); }
.iprice { font-size: 11px; font-weight: 700; color: var(--accent); }
.total-card { background: linear-gradient(135deg, #c85a2a, #e07040); border-radius: 16px; padding: 16px 18px; margin-top: 12px; display: flex; align-items: center; justify-content: space-between; color: white; }
.total-left strong { display: block; font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 700; }
.total-left span { font-size: 11px; opacity: .8; }
.total-right { font-size: 11px; text-align: right; opacity: .85; line-height: 1.8; }

/* Progress */
.prog-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; }
.prog-text { flex: 1; }
.prog-text strong { font-size: 14px; font-weight: 700; }
.prog-text span { display: block; font-size: 11px; color: var(--muted); margin-top: 1px; }
.prog-bar { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; margin-top: 6px; }
.prog-fill { height: 100%; background: var(--accent2); border-radius: 99px; transition: width .4s; }

/* WEEK SWITCHER IN SHOP */
.shop-week-nav { display: flex; gap: 8px; margin-bottom: 14px; }
.swn { flex: 1; padding: 9px; border-radius: 12px; border: 1.5px solid var(--border); background: var(--surface); color: var(--muted); font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Nunito', sans-serif; text-align: center; transition: all .15s; }
.swn.active { background: var(--accent); color: white; border-color: var(--accent); }
.swn:active { transform: scale(.95); }

/* Cuisine flags legend */
.legend { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.lgnd { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--muted); font-weight: 600; }
</style>
</head>
<body>
<div class="app">

<div class="top-bar">
  <div class="logo">
    <div class="logo-icon">🍽️</div>
    <div class="logo-text">
      <h1>Jadłospis dla Pary</h1>
      <span>4 tygodnie · 5 posiłków</span>
    </div>
  </div>
  <button class="week-chip" id="week-chip" onclick="cycleWeek()">Tydzień 1</button>
</div>

<div class="tabs">
  <button class="tab active" onclick="goTab('jadlospis')"><span class="ti">📅</span>Jadłospis</button>
  <button class="tab" onclick="goTab('zakupy')"><span class="ti">🛒</span>Zakupy</button>
</div>

<div class="scroll-area">

<!-- JADŁOSPIS -->
<div class="page active" id="page-jadlospis">
  <div class="week-selector" id="week-sel"></div>
  <div class="legend">
    <div class="lgnd">🇵🇱 PL</div><div class="lgnd">🇮🇹 IT</div><div class="lgnd">🇲🇽 MX</div>
    <div class="lgnd">🇨🇳 CN</div><div class="lgnd">🇬🇷 GR</div><div class="lgnd">🇪🇸 ES</div><div class="lgnd">🌏 AZ</div>
  </div>
  <div id="days-container"></div>
</div>

<!-- ZAKUPY -->
<div class="page" id="page-zakupy">
  <div class="shop-week-nav" id="shop-week-nav"></div>
  <div class="shop-week-label" id="shop-label">Tydzień 1</div>
  <div class="shop-sub" id="shop-sub">Zakupy na cały tydzień dla 2 osób</div>
  <div class="prog-row" id="shop-prog"></div>
  <div id="shop-list"></div>
</div>

</div><!-- /scroll-area -->
</div><!-- /app -->

<!-- RECIPE MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-flag" id="m-flag"></div>
      <div class="modal-type" id="m-type"></div>
      <div class="modal-title" id="m-title"></div>
    </div>
    <div class="modal-body" id="m-body"></div>
    <button class="close-btn" onclick="closeModal()">Zamknij</button>
  </div>
</div>

<script>
// ═══════════════════════════════════ DATA ═══════════════════════════════════

// Structure: 4 weeks, each week has 7 days (0=Sun, 1=Mon, ..., 6=Sat)
// Meals: [sniadanie1, sniadanie2, obiad, podwieczorek, kolacja]
// Poniedziałek-Wtorek = same meals (box), Środa-Czwartek = same (box), Piątek-Sobota = same (box), Niedziela = special home

const DAY_NAMES = ['Niedziela','Poniedziałek','Wtorek','Środa','Czwartek','Piątek','Sobota'];
const DAY_SHORT = ['Nd','Pn','Wt','Śr','Cz','Pt','Sb'];

// Meal types
const MT = ['☀️ I Śniadanie','🍳 II Śniadanie','🍽️ Obiad','🍰 Podwieczorek','📺 Kolacja box'];
const MI = ['ic1','ic2','ic3','ic4','ic5'];

// Helper: is this day a "box" day?
const isBox = d => d !== 0; // Sunday = home day

const WEEKS = [
  // ═══ TYDZIEŃ 1 ═══
  {
    // Pon-Wt
    monTue: [
      { name:'Owsianka z jabłkiem i cynamonem', flag:'🇵🇱', type:'Lekkie śniadanie', box:false,
        ingredients:[{q:'80g',n:'płatki owsiane'},{q:'200ml',n:'mleko'},{q:'1 szt.',n:'jabłko'},{q:'1 łyżeczka',n:'cynamon'},{q:'1 łyżka',n:'miód'},{q:'garść',n:'orzechy włoskie'}],
        steps:['Zagotuj mleko, wsyp płatki, gotuj 3 min mieszając.','Jabłko zetrzyj na tarce lub pokrój w kostkę.','Dodaj jabłko, cynamon i miód do owsianki.','Posyp orzechami przed podaniem.'],
        tip:'Do pudełka wlej owsiankę na zimno (overnight oats) — zalej płatki mlekiem wieczorem, rano gotowe!'
      },
      { name:'Bułki z jajkiem sadzonym i awokado', flag:'🌍', type:'Konkretne śniadanie', box:true,
        ingredients:[{q:'2 szt.',n:'bułki kajzerki'},{q:'2 szt.',n:'jajka'},{q:'1 szt.',n:'awokado'},{q:'1 szt.',n:'pomidor'},{q:'szczypta',n:'sól, pieprz, chili'},{q:'kilka liści',n:'roszponka'}],
        steps:['Usmaż jajka sadzone na maśle.','Awokado rozgnieć widelcem, dopraw solą i cytryną.','Bułki przepół, posmaruj awokado.','Ułóż jajko, plasterki pomidora i roszponkę.'],
        tip:'Do boxu: zawiń bułki osobno, awokado posmaruj na miejscu.'
      },
      { name:'Makaron z kurczakiem i pesto', flag:'🇮🇹', type:'Obiad', box:true,
        ingredients:[{q:'300g',n:'makaron penne (2 os.)'},{q:'2 piersi',n:'filet z kurczaka'},{q:'3 łyżki',n:'pesto bazyliowe (słoik)'},{q:'1 szt.',n:'cukinia'},{q:'100g',n:'pomidorki cherry'},{q:'2 łyżki',n:'parmezan'},{q:'2 łyżki',n:'oliwa z oliwek'},{q:'2 ząbki',n:'czosnek'}],
        steps:['Ugotuj makaron al dente, odcedź zachowując szklankę wody.','Kurczaka pokrój w kostkę, usmaż na oliwie z czosnkiem 6-8 min.','Cukinię pokrój w półtalarki, dodaj do kurczaka, smaż 3 min.','Wymieszaj makaron z pesto, kurczakiem i warzywami.','Dodaj trochę wody z gotowania, posyp parmezanem.'],
        tip:'Do boxu doskonały na zimno lub po podgrzaniu.'
      },
      { name:'Muffiny bananowe z orzechami', flag:'🌍', type:'Podwieczorek / deser', box:true,
        ingredients:[{q:'3 szt.',n:'dojrzałe banany'},{q:'2 szt.',n:'jajka'},{q:'150g',n:'mąka'},{q:'50g',n:'cukier brązowy'},{q:'1 łyżeczka',n:'proszek do pieczenia'},{q:'50g',n:'orzechy włoskie'},{q:'4 łyżki',n:'olej'}],
        steps:['Rozgrzej piekarnik 180°C.','Banany rozgnieć widelcem, wymieszaj z jajkami i olejem.','Dodaj mąkę, cukier, proszek do pieczenia — wymieszaj.','Dodaj posiekane orzechy.','Piecz 18-20 min.'],
        tip:'Rób od razu 12 szt. — starczą na cały tydzień!'
      },
      { name:'Box przekąskowy: deska włoska', flag:'🇮🇹', type:'Kolacja serials box', box:true,
        ingredients:[{q:'80g',n:'prosciutto lub salami'},{q:'80g',n:'mozzarella'},{q:'garść',n:'oliwki'},{q:'2 szt.',n:'chleb ciabatta'},{q:'kilka szt.',n:'pomidorki cherry'},{q:'1 łyżka',n:'oliwa + zioła'}],
        steps:['Ułóż wszystko na desce lub do pojemnika.','Ciabattę potnij w kawałki.','Mozzarellę porwij na kawałki, skrop oliwą.','Posyp ziołami prowansalskimi.'],
        tip:'Układaj w box warstwowo — wygląda pięknie i smakuje wyśmienicie!'
      },
    ],
    // Śr-Cz
    wedThu: [
      { name:'Kasza manna z malinami i wanilią', flag:'🇵🇱', type:'Lekkie śniadanie', box:false,
        ingredients:[{q:'4 łyżki',n:'kasza manna'},{q:'400ml',n:'mleko'},{q:'1 łyżeczka',n:'cukier waniliowy'},{q:'garść',n:'maliny (świeże lub mrożone)'},{q:'1 łyżeczka',n:'dżem malinowy'}],
        steps:['Zagotuj mleko z cukrem waniliowym.','Wsyp kaszę mannę cienkim strumieniem, mieszając.','Gotuj 3 min na małym ogniu.','Podaj z malinami i dżemem.'],
        tip:'Kaszy nie rób do pudełka — rozleje się. Zjedz rano w domu!'
      },
      { name:'Naleśniki z twarożkiem i truskawkami', flag:'🇵🇱', type:'Konkretne śniadanie', box:true,
        ingredients:[{q:'200g',n:'mąka'},{q:'2 szt.',n:'jajka'},{q:'400ml',n:'mleko'},{q:'szczypta',n:'sól'},{q:'250g',n:'twaróg półtłusty'},{q:'2 łyżki',n:'cukier puder'},{q:'garść',n:'truskawki'}],
        steps:['Wymieszaj mąkę, jajka, mleko, sól na gładkie ciasto.','Smaż cienkie naleśniki na odrobinie masła.','Twaróg wymieszaj z cukrem pudrem.','Posmaruj naleśniki, ułóż truskawki, zawiń.'],
        tip:'Do boxu zawiń ciasno w folię — nie rozpadną się.'
      },
      { name:'Kurczak po chińsku z ryżem i warzywami', flag:'🇨🇳', type:'Obiad', box:true,
        ingredients:[{q:'2 piersi',n:'filet z kurczaka'},{q:'200g',n:'ryż jaśminowy'},{q:'1 szt.',n:'papryka czerwona'},{q:'1 szt.',n:'marchewka'},{q:'2 szt.',n:'cebula dymka'},{q:'3 łyżki',n:'sos sojowy'},{q:'1 łyżka',n:'miód'},{q:'1 łyżka',n:'ocet ryżowy'},{q:'2 cm',n:'imbir świeży'},{q:'2 ząbki',n:'czosnek'},{q:'1 łyżka',n:'olej sezamowy'}],
        steps:['Ugotuj ryż wg przepisu na opakowaniu.','Kurczaka pokrój w paski, zamarynuj w sosie sojowym, miodzie i imbirze 15 min.','Na rozgrzanym woku smaż kurczaka 5-6 min.','Dodaj warzywa pokrojone w julienne, smaż 3 min.','Dopraw olejem sezamowym i czosnkiem.'],
        tip:'Idealny do boxu — smakuje równie dobrze na zimno.'
      },

// ═══════════════ STATE ═══════════════
let currentWeek = 0;
let shopWeek = 0;
let checkedItems = {};
try { checkedItems = JSON.parse(localStorage.getItem('para-checked') || '{}'); } catch(e) {}
const saveChecked = () => { try { localStorage.setItem('para-checked', JSON.stringify(checkedItems)); } catch(e) {} };

// ═══════════════ HELPERS ═══════════════
function getWeekData(w) {
  const wd = WEEKS[w];
  return [
    { day: 1, name: 'Poniedziałek', meals: wd.monTue, badge: '📦 box', home: false },
    { day: 2, name: 'Wtorek', meals: wd.monTue, badge: '📦 box', home: false },
    { day: 3, name: 'Środa', meals: wd.wedThu, badge: '📦 box', home: false },
    { day: 4, name: 'Czwartek', meals: wd.wedThu, badge: '📦 box', home: false },
    { day: 5, name: 'Piątek', meals: wd.friSat, badge: '📦 box', home: false },
    { day: 6, name: 'Sobota', meals: wd.friSat, badge: '📦 box', home: false },
    { day: 0, name: 'Niedziela', meals: wd.sunday, badge: '🏠 dom', home: true },
  ];
}

// ═══════════════ RENDER JADŁOSPIS ═══════════════
function renderJadlospis() {
  // Week selector
  const wsel = document.getElementById('week-sel');
  wsel.innerHTML = [0,1,2,3].map(i =>
    `<button class="wsb${i===currentWeek?' active':''}" onclick="setWeek(${i})">Tydzień ${i+1}</button>`
  ).join('');
  document.getElementById('week-chip').textContent = `Tydzień ${currentWeek+1}`;

  // Days
  const days = getWeekData(currentWeek);
  const container = document.getElementById('days-container');
  container.innerHTML = days.map((d, di) => {
    const dayId = `day-${di}`;
    const headerColor = d.home ? 'style="background:#2a7a4f"' : '';
    const meals = d.meals.map((m, mi) => `
      <div class="meal-row" onclick="openModal(${currentWeek},'${d.day}',${mi})">
        <div class="meal-icon ${MI[mi]}">${['☀️','🍳','🍽️','🍰','📺'][mi]}</div>
        <div class="meal-info">
          <div class="meal-type">${MT[mi]}</div>
          <div class="meal-name">${m.flag} ${m.name}</div>
          ${m.box ? '<div class="box-tag">📦 do boxu</div>' : ''}
        </div>
        <div class="meal-arrow">›</div>
      </div>`).join('');

    return `
      <div class="day-section">
        <div class="day-header" ${headerColor} onclick="toggleDay('${dayId}')">
          <h3>${d.name}</h3>
          <div class="day-meta">
            <span class="day-badge">${d.badge}</span>
            <span class="day-toggle open" id="toggle-${dayId}">▼</span>
          </div>
        </div>
        <div class="day-body" id="${dayId}">
          ${meals}
        </div>
      </div>`;
  }).join('');
}

function setWeek(w) {
  currentWeek = w;
  renderJadlospis();
}

function cycleWeek() {
  currentWeek = (currentWeek + 1) % 4;
  renderJadlospis();
}

function toggleDay(id) {
  const body = document.getElementById(id);
  const toggle = document.getElementById('toggle-' + id);
  body.classList.toggle('hidden');
  toggle.classList.toggle('open');
}

// ═══════════════ MODAL ═══════════════
function getMealData(week, day, mealIdx) {
  const wd = WEEKS[week];
  let meals;
  if (day === 0) meals = wd.sunday;
  else if (day === 1 || day === 2) meals = wd.monTue;
  else if (day === 3 || day === 4) meals = wd.wedThu;
  else meals = wd.friSat;
  return meals[mealIdx];
}

function openModal(week, day, mealIdx) {
  const m = getMealData(week, parseInt(day), mealIdx);
  document.getElementById('m-flag').textContent = m.flag;
  document.getElementById('m-type').textContent = m.type;
  document.getElementById('m-title').textContent = m.name;

  const ings = m.ingredients.map(i =>
    `<div class="ingredient"><span class="ing-qty">${i.q}</span><span class="ing-name">${i.n}</span></div>`
  ).join('');

  const steps = m.steps.map((s, i) =>
    `<div class="step"><div class="step-num">${i+1}</div><div>${s}</div></div>`
  ).join('');

  document.getElementById('m-body').innerHTML = `
    <div class="section-title">Składniki (2 osoby)</div>
    <div class="ingredients-list">${ings}</div>
    <div class="section-title">Przepis</div>
    <div class="recipe-steps">${steps}</div>
    ${m.tip ? `<div class="tip-box"><strong>💡 Wskazówka:</strong>${m.tip}</div>` : ''}
  `;

  document.getElementById('modal-overlay').classList.add('show');
  document.querySelector('.scroll-area').style.overflow = 'hidden';
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay') || e.currentTarget.className === 'close-btn') {
    document.getElementById('modal-overlay').classList.remove('show');
    document.querySelector('.scroll-area').style.overflow = '';
  }
}

// ═══════════════ SHOPPING ═══════════════
function renderShopping() {
  const nav = document.getElementById('shop-week-nav');
  nav.innerHTML = [0,1,2,3].map(i =>
    `<button class="swn${i===shopWeek?' active':''}" onclick="setShopWeek(${i})">Tydz. ${i+1}</button>`
  ).join('');

  document.getElementById('shop-label').textContent = `Tydzień ${shopWeek+1}`;

  const data = SHOP[shopWeek];
  const key = `w${shopWeek}`;
  if (!checkedItems[key]) checkedItems[key] = {};

  let total = 0, done = 0, sumAll = 0, sumLeft = 0;
  data.categories.forEach(c => c.items.forEach(it => {
    total++;
    const price = parseFloat((it.p || '0').replace(',','.').replace(' zł','').replace('-','0'));
    if (!isNaN(price)) sumAll += price;
    if (checkedItems[key][c.name + it.n]) {
      done++;
    } else {
      if (!isNaN(price)) sumLeft += price;
    }
  }));

  const pct = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById('shop-sub').textContent = `Zakupy na cały tydzień dla 2 osób · ${total} produktów`;
  document.getElementById('shop-prog').innerHTML = `
    <div class="prog-text">
      <strong>${done} / ${total} produktów</strong>
      <span>zakupiono · ${pct}% gotowe</span>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>`;

  const list = data.categories.map(c => {
    const items = c.items.map(it => {
      const k = c.name + it.n;
      const isDone = checkedItems[key][k] ? 'done' : '';
      return `<div class="sitem ${isDone}" onclick="toggleShop('${key}','${k.replace(/'/g,"\\'")}')">
        <div class="chk">${isDone ? '✓' : ''}</div>
        <div class="iname">${it.n}</div>
        <div class="imeta"><div class="iqty">${it.q}</div><div class="iprice">${it.p}</div></div>
      </div>`;
    }).join('');
    return `<div class="shop-cat"><div class="shop-cat-hdr ${c.cls}">${c.name}</div>${items}</div>`;
  }).join('');

  document.getElementById('shop-list').innerHTML = list + `
    <div class="total-card">
      <div class="total-left">
        <strong>${sumAll.toFixed(2).replace('.',',')} zł</strong>
        <span>Łączny koszt tygodnia</span>
      </div>
      <div class="total-right">
        Pozostało do zakupu:<br>
        <strong style="font-size:14px;color:white">${sumLeft.toFixed(2).replace('.',',')} zł</strong>
      </div>
    </div>`;
}

function setShopWeek(w) {
  shopWeek = w;
  renderShopping();
}

function toggleShop(key, k) {
  if (!checkedItems[key]) checkedItems[key] = {};
  checkedItems[key][k] = !checkedItems[key][k];
  saveChecked();
  renderShopping();
}

// ═══════════════ TABS ═══════════════
function goTab(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
  if (name === 'zakupy') renderShopping();
  document.querySelector('.scroll-area').scrollTo(0, 0);
}

// ═══════════════ INIT ═══════════════
renderJadlospis();

// PWA Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
